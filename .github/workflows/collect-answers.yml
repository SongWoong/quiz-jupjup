name: 퀴즈 정답 수집

on:
  schedule:
    # 매시 7분 (UTC 기준, 정각 직후 혼잡 회피)
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-answers
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 정답 수집
        run: node scripts/collect-answers.mjs

      - name: 변경 시 커밋
        run: |
          git config user.name "quiz-jupjup-bot"
          git config user.email "actions@github.com"
          git add data/answers.json
          if git diff --cached --quiet; then
            echo "변경 없음, 커밋 생략"
          else
            git commit -m "봇: 퀴즈 정답 갱신 ($(date -u +'%Y-%m-%d %H:%M') UTC)"
            git push
          fi
